name: mo_lucro_app
description: Mo Lucro - Gestão financeira e controle de investimentos.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.3.0

  # Navigation
  go_router: ^13.0.0

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.0.0

  # Charts
  fl_chart: ^0.66.0

  # UI
  google_fonts: ^6.1.0
  intl: 0.20.2

  # Utils
  uuid: ^4.2.0

  # Notifications
  flutter_local_notifications: ^17.0.0
  http: ^1.6.0
  url_launcher: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  riverpod_generator: ^2.3.0
  hive_generator: ^2.0.1
  mockito: ^5.4.0

flutter:
  uses-material-design: true
